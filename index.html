<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In Memory of BJ Huisman</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #03050f;
    --navy: #060d1f;
    --blue-glow: #1a4fa8;
    --cyan: #4fc3f7;
    --violet: #7c4dff;
    --soft-violet: #b39ddb;
    --gold: #ffd54f;
    --white: #e8f0ff;
    --muted: #8899cc;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
  }

  .poster {
    position: relative;
    width: 100%;
    min-height: 1100px;
    background: var(--deep);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 60px 50px;
  }

  /* ── Starfield canvas ── */
  canvas#stars {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ── Cosmic nebula glow layers ── */
  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    z-index: 1;
    pointer-events: none;
  }
  .nebula-1 {
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(28,60,180,0.35) 0%, transparent 70%);
    top: -100px; left: -150px;
    animation: nebulaFloat 14s ease-in-out infinite alternate;
  }
  .nebula-2 {
    width: 500px; height: 400px;
    background: radial-gradient(ellipse, rgba(100,50,220,0.28) 0%, transparent 70%);
    bottom: 100px; right: -80px;
    animation: nebulaFloat 18s ease-in-out infinite alternate-reverse;
  }
  .nebula-3 {
    width: 350px; height: 350px;
    background: radial-gradient(ellipse, rgba(0,180,230,0.15) 0%, transparent 70%);
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    animation: nebulaFloat 22s ease-in-out infinite alternate;
  }
  @keyframes nebulaFloat {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── Spaceship silhouette ── */
  .ship-wrap {
    position: absolute;
    top: 38px; right: 55px;
    opacity: 0.13;
    z-index: 2;
    animation: shipDrift 20s ease-in-out infinite alternate;
  }
  @keyframes shipDrift {
    from { transform: translate(0,0) rotate(-4deg); }
    to   { transform: translate(-12px, 12px) rotate(2deg); }
  }

  /* ── Turret grid (bottom-left) ── */
  .turret-wrap {
    position: absolute;
    bottom: 155px; left: 40px;
    opacity: 0.1;
    z-index: 2;
  }

  /* ── Top line ornament ── */
  .ornament {
    position: relative; z-index: 3;
    width: 100%;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 28px;
  }
  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.6;
  }
  .ornament-diamond {
    width: 8px; height: 8px;
    background: var(--cyan);
    transform: rotate(45deg);
    box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px var(--cyan); opacity: 1; }
    50%      { box-shadow: 0 0 22px var(--cyan), 0 0 40px rgba(79,195,247,0.4); opacity: 0.7; }
  }

  /* ── Title ── */
  .title-wrap {
    position: relative; z-index: 3;
    text-align: center;
    margin-bottom: 10px;
  }
  .title-sub {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 6px;
    color: var(--cyan);
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 10px;
  }
  .title-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: 68px;
    font-weight: 900;
    line-height: 1;
    color: var(--white);
    text-shadow:
      0 0 20px rgba(79,195,247,0.7),
      0 0 50px rgba(79,195,247,0.4),
      0 0 100px rgba(28,60,180,0.6);
    letter-spacing: 4px;
    animation: titleGlow 4s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(79,195,247,0.7), 0 0 50px rgba(79,195,247,0.4); }
    to   { text-shadow: 0 0 30px rgba(79,195,247,1), 0 0 80px rgba(79,195,247,0.6), 0 0 120px rgba(124,77,255,0.5); }
  }

  /* ── Divider ── */
  .divider {
    position: relative; z-index: 3;
    width: 80%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--violet), var(--cyan), var(--violet), transparent);
    margin: 28px auto;
    opacity: 0.7;
  }
  .divider::after {
    content: '✦';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    color: var(--soft-violet);
    font-size: 14px;
    background: var(--deep);
    padding: 0 12px;
    animation: spinStar 8s linear infinite;
  }
  @keyframes spinStar {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* ── Center section ── */
  .center-section {
    position: relative; z-index: 3;
    text-align: center;
    max-width: 560px;
    margin-bottom: 32px;
  }
  .center-tagline {
    font-family: 'Orbitron', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--soft-violet);
    text-transform: uppercase;
    line-height: 2;
    margin-bottom: 8px;
  }
  .center-body {
    font-size: 20px;
    font-weight: 300;
    line-height: 1.8;
    color: rgba(232,240,255,0.82);
    letter-spacing: 0.5px;
  }

  /* ── Quote ── */
  .quote-wrap {
    position: relative; z-index: 3;
    max-width: 600px;
    text-align: center;
    margin-bottom: 36px;
    padding: 28px 40px;
  }
  .quote-wrap::before,
  .quote-wrap::after {
    content: '';
    position: absolute;
    width: 50px; height: 50px;
    border-color: rgba(79,195,247,0.4);
    border-style: solid;
  }
  .quote-wrap::before {
    top: 0; left: 0;
    border-width: 2px 0 0 2px;
  }
  .quote-wrap::after {
    bottom: 0; right: 0;
    border-width: 0 2px 2px 0;
  }
  .quote-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1.6;
    text-shadow: 0 0 20px rgba(255,213,79,0.5), 0 0 40px rgba(255,213,79,0.25);
    font-style: italic;
    letter-spacing: 0.5px;
  }

  /* ── Game badges ── */
  .badges {
    position: relative; z-index: 3;
    display: flex;
    gap: 20px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 20px;
    border: 1px solid rgba(79,195,247,0.3);
    border-radius: 4px;
    background: rgba(79,195,247,0.05);
    backdrop-filter: blur(4px);
    transition: all 0.3s ease;
  }
  .badge:hover {
    border-color: var(--cyan);
    background: rgba(79,195,247,0.12);
    box-shadow: 0 0 20px rgba(79,195,247,0.2);
  }
  .badge-icon { font-size: 18px; }
  .badge-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--cyan);
    text-transform: uppercase;
  }

  /* ── Bottom divider ── */
  .bottom-div {
    position: relative; z-index: 3;
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,77,255,0.8), transparent);
    margin-bottom: 30px;
  }

  /* ── Footer ── */
  .footer {
    position: relative; z-index: 3;
    text-align: center;
  }
  .footer-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--soft-violet);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .footer-text {
    font-size: 16px;
    font-weight: 300;
    color: rgba(232,240,255,0.55);
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* ── Scan line overlay ── */
  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
  }

  /* ── Shooting stars ── */
  .shooting-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    z-index: 2;
    animation: shoot linear infinite;
  }
  @keyframes shoot {
    0%   { transform: translate(0, 0); opacity: 1; }
    100% { transform: translate(300px, 300px); opacity: 0; }
  }
</style>
</head>
<body>
<div class="poster" id="poster">
  <canvas id="stars"></canvas>

  <!-- Nebula atmosphere -->
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <!-- Spaceship silhouette SVG -->
  <div class="ship-wrap">
    <svg width="220" height="160" viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Main hull -->
      <path d="M110 10 L170 90 L140 100 L110 75 L80 100 L50 90 Z" fill="#7ca8d0" stroke="#aaccee" stroke-width="1.5"/>
      <!-- Wings -->
      <path d="M50 90 L10 130 L55 115 L80 100 Z" fill="#5a8ab0"/>
      <path d="M170 90 L210 130 L165 115 L140 100 Z" fill="#5a8ab0"/>
      <!-- Engine glow -->
      <ellipse cx="110" cy="98" rx="18" ry="6" fill="rgba(79,195,247,0.5)"/>
      <!-- Cockpit -->
      <ellipse cx="110" cy="48" rx="14" ry="18" fill="rgba(100,180,255,0.3)" stroke="#7cc8f8" stroke-width="1"/>
      <!-- Detail lines -->
      <line x1="110" y1="10" x2="110" y2="75" stroke="#cce4ff" stroke-width="0.7" opacity="0.5"/>
      <line x1="80" y1="100" x2="140" y2="100" stroke="#cce4ff" stroke-width="0.7" opacity="0.5"/>
    </svg>
  </div>

  <!-- Turret grid SVG -->
  <div class="turret-wrap">
    <svg width="130" height="140" viewBox="0 0 130 140" fill="none">
      <!-- Base platform -->
      <rect x="20" y="110" width="90" height="14" rx="2" fill="#4a6fa8" stroke="#8aadcc" stroke-width="1"/>
      <!-- Turret body -->
      <rect x="45" y="78" width="40" height="34" rx="3" fill="#3a5a88" stroke="#7aadcc" stroke-width="1"/>
      <!-- Barrel -->
      <rect x="61" y="52" width="8" height="30" rx="2" fill="#5a88bb" stroke="#9abcdd" stroke-width="0.8"/>
      <!-- Dome top -->
      <path d="M45 80 Q65 58 85 80" fill="#4a78a8" stroke="#8ab8dd" stroke-width="1"/>
      <!-- Sight glow -->
      <circle cx="65" cy="54" r="4" fill="rgba(255,100,100,0.6)" stroke="#ff8080" stroke-width="0.8"/>
      <!-- Small details -->
      <rect x="48" y="95" width="8" height="6" rx="1" fill="#2a4a78"/>
      <rect x="74" y="95" width="8" height="6" rx="1" fill="#2a4a78"/>
      <!-- Left mini turret -->
      <rect x="5" y="90" width="22" height="20" rx="2" fill="#2a4578" stroke="#6a9aaa" stroke-width="0.8"/>
      <rect x="14" y="74" width="5" height="18" rx="1" fill="#4a78a8"/>
      <!-- Right mini turret -->
      <rect x="103" y="90" width="22" height="20" rx="2" fill="#2a4578" stroke="#6a9aaa" stroke-width="0.8"/>
      <rect x="111" y="74" width="5" height="18" rx="1" fill="#4a78a8"/>
    </svg>
  </div>

  <!-- Scanlines -->
  <div class="scanlines"></div>

  <!-- Content -->
  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line"></div>
  </div>

  <div class="title-wrap">
    <div class="title-sub">✦ &nbsp;In Memory of&nbsp; ✦</div>
    <div class="title-main">BJ Huisman</div>
  </div>

  <div class="divider"></div>



  <div class="quote-wrap">
    <div class="quote-text">"He died doing what he loved."</div>
  </div>



  <div class="bottom-div"></div>


</div>

<script>
  // Starfield
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  const poster = document.getElementById('poster');

  function resize() {
    canvas.width = poster.offsetWidth;
    canvas.height = poster.offsetHeight;
    drawStars();
  }

  const stars = Array.from({length: 280}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.6 + 0.2,
    alpha: Math.random() * 0.7 + 0.2,
    twinkleSpeed: Math.random() * 0.02 + 0.005,
    twinklePhase: Math.random() * Math.PI * 2
  }));

  // A few bigger star clusters
  const bigStars = Array.from({length: 18}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 2.5 + 1.5,
    alpha: Math.random() * 0.5 + 0.5,
    twinkleSpeed: Math.random() * 0.03 + 0.01,
    twinklePhase: Math.random() * Math.PI * 2,
    color: Math.random() > 0.5 ? '#c8e8ff' : '#ffe0f0'
  }));

  let frame = 0;
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame += 0.4;

    stars.forEach(s => {
      const alpha = s.alpha * (0.6 + 0.4 * Math.sin(s.twinklePhase + frame * s.twinkleSpeed));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fill();
    });

    bigStars.forEach(s => {
      const alpha = s.alpha * (0.5 + 0.5 * Math.sin(s.twinklePhase + frame * s.twinkleSpeed));
      const x = s.x * canvas.width, y = s.y * canvas.height;
      // Glow
      const grd = ctx.createRadialGradient(x, y, 0, x, y, s.r * 4);
      grd.addColorStop(0, `rgba(200,230,255,${alpha})`);
      grd.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(x, y, s.r * 4, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color || '#e8f4ff';
      ctx.globalAlpha = alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    requestAnimationFrame(drawStars);
  }

  resize();
  window.addEventListener('resize', resize);
</script>
</body>
</html>
